<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - RBWR APRM Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Consolas&family=Inter:wght@300;400;600;800&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Consolas', 'monospace'],
                        reactor: ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #07080a;
            color: #ffffff;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.05) 0%, transparent 60%);
            overflow-x: hidden;
        }

        .cyber-grid {
            background-image:
                linear-gradient(rgba(18, 22, 28, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 22, 28, 0.4) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .cyber-panel {
            background: rgba(17, 20, 26, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 240, 255, 0.08);
            position: relative;
        }

        .cyber-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
        }

        .glow-cyan {
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.05);
        }

        .accent-cyan {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .input-container {
            background-color: rgba(11, 13, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-container:focus-within {
            border-color: #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
        }

        @keyframes hazard-pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .hazard-glow {
            animation: hazard-pulse 2s infinite;
        }
    </style>
</head>

<body class="cyber-grid min-h-screen flex items-center justify-center p-6 select-none font-sans">

    <div class="max-w-md w-full flex flex-col gap-8 relative">

        <div
            class="absolute -inset-10 bg-gradient-to-r from-cyan-500/10 to-blue-500/10 blur-3xl rounded-full opacity-30 -z-10">
        </div>

        <div class="text-center flex flex-col items-center gap-2">
            <div class="relative w-24 h-24 mb-2 flex items-center justify-center">
                <div
                    class="absolute inset-0 rounded-full border-2 border-dashed border-[#00f0ff] animate-[spin_25s_linear_infinite] opacity-60">
                </div>
                <div class="absolute inset-3 rounded-full border border-[#00f0ff]/30 animate-ping opacity-45"></div>
                <div
                    class="w-14 h-14 rounded-full bg-cyan-950/40 border border-[#00f0ff]/50 flex items-center justify-center backdrop-blur-md shadow-[0_0_15px_rgba(0,240,255,0.2)]">
                    <svg class="w-7 h-7 text-[#00f0ff] drop-shadow-[0_0_8px_rgba(0,240,255,0.6)] animate-pulse"
                        fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z">
                        </path>
                    </svg>
                </div>
            </div>

            <h1
                class="font-reactor text-3xl tracking-widest text-[#00f0ff] uppercase select-none drop-shadow-[0_0_10px_rgba(0,240,255,0.3)]">
                Admin Login</h1>
            <span class="text-[10px] text-slate-500 font-mono tracking-[0.25em] block">// APRM Calculator Admin //</span>
        </div>

        <div class="cyber-panel glow-cyan p-8 rounded-2xl flex flex-col gap-6">
            <div class="border-b border-slate-800/80 pb-4">
                <h2 class="text-sm font-bold tracking-widest accent-cyan font-reactor uppercase">Login</h2>
                <p class="text-xs text-slate-400 font-mono mt-1.5 leading-relaxed">Enter your administrator credentials to log in.</p>
            </div>

            {% if error %}
            <div
                class="relative overflow-hidden rounded-lg bg-rose-950/30 border border-red-500/40 p-4 shadow-[0_0_15px_rgba(239,68,68,0.1)] flex gap-3.5 items-start">
                <div class="absolute top-0 left-0 bottom-0 w-1 bg-[#ff003c]"></div>
                <svg class="w-5 h-5 text-[#ff003c] shrink-0 mt-0.5 hazard-glow" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
                <div class="flex flex-col gap-0.5">
                    <span class="text-[10px] font-mono font-bold text-[#ff003c] tracking-widest">ERROR</span>
                    <p class="text-xs text-slate-300 font-mono font-medium leading-relaxed">{{ error }}</p>
                </div>
            </div>
            {% endif %}

            <form action="/admin/login" method="POST" class="flex flex-col gap-6" onsubmit="handleSubmit(event)">
                <input type="hidden" name="next" value="{{ next_url or '/admin' }}">

                <div class="flex flex-col gap-2">
                    <label for="username" class="text-[10px] font-mono font-bold text-slate-400 tracking-wider">USERNAME</label>
                    <div class="input-container flex items-center rounded-xl px-4 py-0.5">
                        <svg class="w-5 h-5 text-slate-500 shrink-0 mr-3" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z">
                            </path>
                        </svg>
                        <input type="text" id="username" name="username" required autocomplete="username"
                            placeholder="Enter username"
                            class="bg-transparent w-full py-3.5 text-sm text-white placeholder-slate-600 outline-none">
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label for="password" class="text-[10px] font-mono font-bold text-slate-400 tracking-wider">PASSWORD</label>
                    <div class="input-container flex items-center rounded-xl px-4 py-0.5">
                        <svg class="w-5 h-5 text-slate-500 shrink-0 mr-3" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z">
                            </path>
                        </svg>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                            placeholder="Enter password"
                            class="bg-transparent w-full py-3.5 text-sm text-white placeholder-slate-600 outline-none">
                        <button type="button" onclick="togglePasswordVisibility()"
                            class="text-slate-500 hover:text-[#00f0ff] focus:outline-none transition p-1 ml-2">
                            <svg id="eye-open" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.43 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z">
                                </path>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            <svg id="eye-closed" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                                stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                    class="relative group overflow-hidden px-6 py-4 bg-[#00f0ff] hover:bg-[#00f0ff]/90 text-[#07080a] font-bold rounded-xl transition duration-300 text-sm tracking-widest uppercase font-mono mt-3 shadow-[0_4px_20px_rgba(0,240,255,0.25)] flex items-center justify-center gap-2">
                    <span
                        class="absolute inset-0 w-full h-full bg-white/20 transform -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-out"></span>

                    <svg id="submit-spinner" class="animate-spin -ml-1 mr-2 h-4 w-4 text-[#07080a] hidden"
                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>

                    <span id="submit-text">LOG IN</span>
                </button>
            </form>
        </div>

        <div class="text-center flex justify-center items-center gap-4 text-xs font-mono text-slate-500">
            <a href="/" class="hover:text-slate-300 transition hover:underline">Return to Homepage</a>
        </div>

    </div>

    <script>
        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('password');
            const eyeOpen = document.getElementById('eye-open');
            const eyeClosed = document.getElementById('eye-closed');

            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                pwdInput.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        }

        function handleSubmit(e) {
            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('submit-spinner');
            const text = document.getElementById('submit-text');

            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            spinner.classList.remove('hidden');
            text.innerText = 'LOGGING IN...';
        }
    </script>
</body>

</html>
