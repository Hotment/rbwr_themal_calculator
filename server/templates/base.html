<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RBWR APRM Calculator{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        background: '#0a0a0c',
                        surface: '#121217',
                        surfaceElevated: '#1a1a21',
                        border: 'rgba(255, 255, 255, 0.08)',
                        borderHover: 'rgba(255, 255, 255, 0.15)',
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0c;
            color: #f3f4f6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .premium-glass {
            background: #121217;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(16px);
        }

        .premium-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .premium-checkbox {
            -webkit-appearance: none;
            appearance: none;
            background-color: rgba(255, 255, 255, 0.05);
            width: 18px;
            height: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            display: inline-grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .premium-checkbox::before {
            content: "";
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: 120ms transform cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #3b82f6;
            border-radius: 2px;
        }

        .premium-checkbox:checked {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.1);
        }

        .premium-checkbox:checked::before {
            transform: scale(1);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            appearance: textfield;
            -moz-appearance: textfield;
        }

        .interactive-card {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }

        .interactive-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .subtle-gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #ffffff, #a1a1aa);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-background text-gray-100 min-h-screen flex flex-col font-sans selection:bg-blue-500/30">

    <header class="border-b border-white/5 bg-background/80 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3">
                <svg class="w-6 h-6 text-blue-500 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5"
                    viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="3" fill="currentColor" fill-opacity="0.7"></circle>
                    <ellipse cx="12" cy="12" rx="9" ry="3" stroke="currentColor" stroke-width="1.5"
                        transform="rotate(30 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="9" ry="3" stroke="currentColor" stroke-width="1.5"
                        transform="rotate(90 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="9" ry="3" stroke="currentColor" stroke-width="1.5"
                        transform="rotate(150 12 12)"></ellipse>
                </svg>
                <div class="flex flex-col">
                    <span class="font-bold text-sm tracking-wide text-zinc-100">RBWR Utility</span>
                    <span class="text-[10px] text-zinc-500 font-mono tracking-wider -mt-1 uppercase">Thermal
                        Calculator</span>
                </div>
            </a>
            <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-400">
                {% block nav %}{% endblock %}
            </nav>
            <div class="md:hidden">
                {% block mobile_nav %}{% endblock %}
            </div>
        </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="border-t border-white/5 bg-background py-8 text-center text-xs text-gray-500 mt-20">
        <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="font-mono">
                © 2026 RBWR Utilities
            </div>
            <div class="flex gap-6 font-medium">
                <a href="https://github.com/Hotment/rbwr_themal_calculator" target="_blank"
                    class="hover:text-gray-300 transition-colors">Github</a>
                {% block footer_links %}{% endblock %}
            </div>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>

</html>
